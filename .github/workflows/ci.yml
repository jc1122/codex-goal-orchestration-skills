name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-gate:
    name: Deterministic Gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python scripts
        run: |
          python3 -m py_compile $(find skills bin scripts -type f -name '*.py' | sort)

      - name: Check shared wrappers
        run: npm run check:shared

      - name: Check preparedness fixtures
        run: npm run check:fixtures

      - name: Check golden offline smoke
        run: npm run check:golden

      - name: Remove bytecode generated by syntax checks
        run: |
          find skills bin scripts -type d -name __pycache__ -prune -exec rm -rf {} +

      - name: Check committed whitespace
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "${{ github.event.before }}...HEAD"
          else
            git diff --check --root HEAD
          fi

      - name: Check generated changes
        run: |
          git diff --check HEAD
          git diff --exit-code

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Verify temp install
        run: |
          skills_dir="$RUNNER_TEMP/goal-skills"
          node bin/install-goal-skills.js --dest "$skills_dir" --force
          test -d "$skills_dir/goal-preflight"
          test -d "$skills_dir/goal-main-orchestrator"
          test -d "$skills_dir/goal-branch-orchestrator"
          test -d "$skills_dir/_goal_shared"
          diff -qr skills/goal-preflight "$skills_dir/goal-preflight"
          diff -qr skills/goal-main-orchestrator "$skills_dir/goal-main-orchestrator"
          diff -qr skills/goal-branch-orchestrator "$skills_dir/goal-branch-orchestrator"
          diff -qr skills/_goal_shared "$skills_dir/_goal_shared"

      - name: Assert no bytecode directories remain
        run: |
          if find skills bin scripts -type d -name __pycache__ -print -quit | grep -q .; then
            find skills bin scripts -type d -name __pycache__ -print
            exit 1
          fi
